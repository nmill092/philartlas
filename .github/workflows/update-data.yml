name: Update data from philart.net

on: 
  schedule: 
    - cron: '0 0 * * 5'
      timezone: 'America/New_York'

  workflow_dispatch: 

permissions: 
  contents: write

jobs: 
  refetch-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node
        uses: actions/setup-node@v4
        with: 
          node-version: '26'

      - name: Install dependencies
        run: |
          npm ci

      - name: Refetch data from Philart
        run: |
          node scripts/fetch/fetch.ts
      
      - name: Build geojson file
        run: |
          node scripts/geo/buildFeatures.ts